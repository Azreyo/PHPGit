name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  php-checks:
    name: PHP ${{ matrix.php }} checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.4' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
          extensions: pdo

      - name: Show PHP version
        run: php -v

      - name: Validate Composer files
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --ignore-platform-req=ext-http

      - name: Lint PHP sources
        run: |
          find src -type f -name '*.php' -print0 | xargs -0 -n 1 php -l
