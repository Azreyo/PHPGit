  js-lint:
    name: JSLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run JSLint
        run: npm run lint:js
